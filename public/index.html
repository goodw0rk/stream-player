<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NontonX TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#000;--card:#0d0d0d;--card-h:#161616;--surf:#0a0a0a;--elev:#1a1a1a;--acc:#e11d48;--acc2:rgba(225,29,72,.15);--grn:#22c55e;--grn2:rgba(34,197,94,.15);--txt:#f5f5f5;--txt2:#a3a3a3;--txt3:#525252;--bdr:#1a1a1a;--bdr2:#262626;--r:16px;--rs:10px;--rx:6px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--txt);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

    /* Header */
    .hdr{position:sticky;top:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:0 16px;border-bottom:1px solid var(--bdr)}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;height:52px}
    .logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;letter-spacing:-.5px}
    .logo-i{width:30px;height:30px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
    .logo span{color:var(--acc)}
    .hdr-btn{width:36px;height:36px;border-radius:10px;background:var(--elev);border:1px solid var(--bdr);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}

    /* Tabs */
    .tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:0 0 10px;-webkit-overflow-scrolling:touch}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:7px 14px;border-radius:20px;background:transparent;border:1px solid var(--bdr);color:var(--txt3);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .tab.on{background:var(--txt);color:var(--bg);border-color:var(--txt)}
    .tab:not(.on):active{background:var(--elev)}

    /* Player */
    .pw{display:none;position:relative;background:#000;width:100%;aspect-ratio:16/9;overflow:hidden}
    .pw.show{display:block}
    .pw video{width:100%;height:100%;display:block;object-fit:contain;background:#000}
    .pw:fullscreen,.pw:-webkit-full-screen{width:100vw!important;height:100vh!important;aspect-ratio:auto!important;display:flex!important;align-items:center;justify-content:center}
    .pw:fullscreen video,.pw:-webkit-full-screen video{width:100%;height:100%;object-fit:contain}
    .pl{position:absolute;top:12px;left:12px;background:rgba(34,197,94,.9);color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;z-index:10;transition:opacity .4s;pointer-events:none;display:flex;align-items:center;gap:5px}
    .pl.err{background:rgba(225,29,72,.9)}.pl.hid{opacity:0}
    .ld{width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .pc{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:15px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
    .ctrls{position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;align-items:center;gap:14px;z-index:10;transition:opacity .4s}
    .ctrls.hid{opacity:0;pointer-events:none}
    .cb{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:7px;border-radius:8px;display:flex;align-items:center;justify-content:center}
    .cb:active{background:rgba(255,255,255,.15)}.sp{flex:1}
    .cp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.35);display:none;align-items:center;justify-content:center;z-index:10;backdrop-filter:blur(6px)}
    .cp.show{display:flex}
    .cp::after{content:'';width:0;height:0;border-style:solid;border-width:13px 0 13px 22px;border-color:transparent transparent transparent #fff;margin-left:4px}
    .ld-o{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);z-index:8}
    .ld-o.show{display:flex}
    .spn{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tz{position:absolute;inset:0;z-index:6}
    .svg{width:20px;height:20px;fill:currentColor}

    /* Content */
    .ct{padding:14px;padding-bottom:90px}
    .sec{margin-bottom:24px}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .st{font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
    .sc{font-size:11px;color:var(--txt3);font-weight:500;background:var(--elev);padding:3px 7px;border-radius:5px}

    /* Live banner */
    .lb{background:linear-gradient(135deg,#1a0008,#0d0d0d 50%,#000d1a);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:18px;position:relative;overflow:hidden}
    .lb::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,var(--acc2),transparent 70%)}
    .lb-h{display:flex;align-items:center;gap:7px;margin-bottom:10px;position:relative}
    .live-b{background:var(--acc);color:#fff;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1px;animation:pulse 2s infinite}
    .lb-t{font-size:12px;color:var(--txt2)}
    .lb-m{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:relative}
    .lb-m::-webkit-scrollbar{display:none}

    /* Match card */
    .mc{flex-shrink:0;width:240px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:all .2s}
    .mc:active{transform:scale(.97);border-color:var(--bdr2)}
    .mc-t{padding:12px 12px 8px;display:flex;align-items:center;justify-content:space-between}
    .mc-l{font-size:11px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .mc-s{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
    .mc-s.live{background:var(--acc2);color:var(--acc)}.mc-s.up{background:var(--elev);color:var(--txt3)}
    .mc-tm{padding:0 12px 12px}
    .mc-r{display:flex;align-items:center;gap:8px;padding:5px 0}
    .mc-f{width:26px;height:26px;border-radius:50%;background:var(--elev);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .mc-n{font-size:13px;font-weight:600}
    .mc-vs{text-align:center;padding:2px 0;font-size:10px;color:var(--txt3);font-weight:600}
    .mc-b{padding:8px 12px;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
    .mc-st{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:4px}
    .mc-p{width:26px;height:26px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center}
    .mc-p::after{content:'';width:0;height:0;border-style:solid;border-width:4px 0 4px 8px;border-color:transparent transparent transparent #fff;margin-left:2px}

    /* Channel grid */
    .cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
    .cc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
    .cc:active{background:var(--card-h);transform:scale(.97)}
    .ci{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .ci.bein{background:linear-gradient(135deg,#dc2626,#991b1b)}.ci.fox{background:linear-gradient(135deg,#1d4ed8,#1e3a8a)}.ci.alk{background:linear-gradient(135deg,#059669,#047857)}.ci.pre{background:linear-gradient(135deg,#7c3aed,#5b21b6)}.ci.tyc{background:linear-gradient(135deg,#2563eb,#1d4ed8)}.ci.tvri{background:linear-gradient(135deg,#0ea5e9,#0284c7)}.ci.fifa{background:linear-gradient(135deg,#f59e0b,#d97706)}.ci.f1ch{background:linear-gradient(135deg,#e11d48,#be123c)}.ci.rb{background:linear-gradient(135deg,#1e40af,#1e3a8a)}.ci.default{background:linear-gradient(135deg,#1a1a2e,#16213e)}
    .cn{font-size:12px;font-weight:600;line-height:1.3}
    .cd{font-size:10px;color:var(--txt3);display:flex;align-items:center;gap:3px}
    .cd .dot{width:5px;height:5px;border-radius:50%;background:var(--grn)}

    /* Stream list */
    .sl{display:flex;flex-direction:column;gap:5px}
    .si{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
    .si:active{background:var(--card-h);transform:scale(.98)}
    .si-i{width:36px;height:36px;border-radius:9px;background:var(--elev);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .si-n{font-size:13px;font-weight:600}
    .si-m{font-size:11px;color:var(--txt3);margin-top:1px}
    .si-q{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;background:var(--grn2);color:var(--grn)}
    .si-a{color:var(--txt3);font-size:16px;flex-shrink:0}

    /* Back nav */
    .bk{display:flex;align-items:center;gap:7px;color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;padding:7px 0;margin-bottom:10px}
    .bk:active{color:var(--txt)}.bk-a{font-size:16px}

    /* State */
    .msg{text-align:center;padding:50px 20px;color:var(--txt3);font-size:13px}
    .msg .spn{width:26px;height:26px;border:3px solid var(--bdr);border-top-color:var(--acc);margin:0 auto 14px}

    /* Bottom nav */
    .bn{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;z-index:200;padding:6px 0 env(safe-area-inset-bottom,6px)}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;color:var(--txt3);font-size:10px;font-weight:600;cursor:pointer;transition:color .2s}
    .ni.on{color:var(--txt)}.ni:active{opacity:.7}
    .ni-i{font-size:18px;line-height:1}

    /* Search */
    .so{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);display:none;flex-direction:column}
    .so.show{display:flex}
    .s-h{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr)}
    .s-i{flex:1;background:var(--elev);border:1px solid var(--bdr);border-radius:9px;padding:9px 12px;color:var(--txt);font-size:14px;font-family:inherit;outline:none}
    .s-i::placeholder{color:var(--txt3)}
    .s-c{color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;padding:7px}
    .s-r{flex:1;overflow-y:auto;padding:14px}

    /* SVG icon */
    .svg{width:20px;height:20px;fill:currentColor}
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-top">
      <div class="logo"><div class="logo-i">▶</div>Nonton<span>X</span></div>
      <div style="display:flex;gap:6px">
        <div class="hdr-btn" onclick="openSearch()">🔍</div>
        <div class="hdr-btn" onclick="location.reload()">↻</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="pw" id="pw">
    <video id="vid" playsinline webkit-playsinline autoplay muted></video>
    <div class="pl" id="pl"><div class="ld"></div>CONNECTING</div>
    <div class="ld-o" id="lo"><div class="spn"></div></div>
    <div class="tz" id="tz"></div>
    <div class="cp" id="cp" onclick="togPlay()"></div>
    <div class="ctrls" id="ct">
      <button class="cb" id="bp" onclick="togPlay()">⏸</button>
      <button class="cb" id="bm" onclick="togMute()">🔇</button>
      <div class="sp"></div>
      <button class="cb" id="bf" onclick="goFs()"><svg class="svg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
    </div>
    <button class="pc" id="pcl" onclick="closeP()">✕</button>
  </div>

  <div id="iw" style="display:none;position:relative">
    <iframe id="ifr" style="width:100%;aspect-ratio:16/9;border:none;background:#000" allowfullscreen allow="autoplay;fullscreen;picture-in-picture;encrypted-media"></iframe>
    <button class="pc" onclick="closeI()" style="position:absolute;top:12px;right:12px">✕</button>
  </div>

  <div class="ct" id="ct2"><div class="msg"><div class="spn"></div>Memuat...</div></div>

  <div class="bn" id="bn">
    <div class="ni on" data-s="football" onclick="nav(this)"><div class="ni-i">⚽</div>Football</div>
    <div class="ni" data-s="sportstv" onclick="nav(this)"><div class="ni-i">📡</div>Sports TV</div>
    <div class="ni" data-s="motogp" onclick="nav(this)"><div class="ni-i">🏍️</div>MotoGP</div>
    <div class="ni" data-s="f1" onclick="nav(this)"><div class="ni-i">🏎️</div>F1</div>
  </div>

  <div class="so" id="so">
    <div class="s-h">
      <input class="s-i" id="si" placeholder="Cari match..." oninput="doSearch(this.value)">
      <div class="s-c" onclick="closeSearch()">Batal</div>
    </div>
    <div class="s-r" id="sr"></div>
  </div>

  <script>
    const API='';
    let cur='football',hls=null,sports=[],src={},allM=[],cTimer=null,cVis=true,gesture=false;
    let isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
    let isAnd=/Android/i.test(navigator.userAgent);

    async function init(){
      try{
        const r=await fetch(`${API}/api/sports`);sports=await r.json();
        sports.forEach(s=>src[s.key]=s.source);renderTabs();load(cur);
      }catch{el('ct2').innerHTML='<div class="msg">Server offline.</div>'}
    }

    function renderTabs(){
      el('tabs').innerHTML=sports.map(s=>`<div class="tab ${s.key===cur?'on':''}" onclick="switchS('${s.key}')">${s.label}</div>`).join('');
    }

    function switchS(k){cur=k;renderTabs();updNav(k);closeP();closeI();load(k)}
    function nav(e){switchS(e.dataset.s)}
    function updNav(s){document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('on',n.dataset.s===s))}

    async function load(sport){
      const c=el('ct2');c.innerHTML='<div class="msg"><div class="spn"></div>Memuat...</div>';
      try{
        const r=await fetch(`${API}/api/listings/${sport}`);const d=await r.json();
        if(!d.length){c.innerHTML='<div class="msg">Tidak ada channel.</div>';return}
        if(src[sport]==='nontonx')renderNx(d,sport);
        else if(src[sport]==='footybitez')renderFB(d);
        else if(src[sport]==='sportstv')renderSTV(d);
      }catch{c.innerHTML='<div class="msg">Gagal memuat.</div>'}
    }

    // NontonX
    function renderNx(servers,sport){
      const l=sports.find(s=>s.key===sport)?.label||sport;
      const em={motogp:'🏍️',f1:'🏎️',worldsbk:'🏁',randomtv:'📺'};
      el('ct2').innerHTML=`<div class="sec"><div class="sh"><div class="st">${em[sport]||'📺'} ${l}</div><div class="sc">${servers.length} server</div></div><div class="cg">${servers.map(s=>`<div class="cc" onclick="playUrl('${esc(s.url)}')"><div class="ci default">${em[sport]||'📺'}</div><div class="cn">${esc(s.name)}</div><div class="cd"><div class="dot"></div>Online</div></div>`).join('')}</div></div>`;
    }

    // Sports TV
    function renderSTV(channels){
      const cats={};channels.forEach(ch=>{if(!cats[ch.category])cats[ch.category]=[];cats[ch.category].push(ch)});
      let h='';
      for(const[k,chs]of Object.entries(cats)){
        h+=`<div class="sec"><div class="sh"><div class="st">${k==='Football'?'⚽':'🏏'} ${k}</div><div class="sc">${chs.length} ch</div></div><div class="cg">${chs.map(ch=>`<div class="cc" onclick="playDirect('${esc(ch.url)}')"><div class="ci ${ch.cls||'default'}">${ch.logo}</div><div class="cn">${esc(ch.name)}</div><div class="cd"><div class="dot"></div>Live</div></div>`).join('')}</div></div>`;
      }
      el('ct2').innerHTML=h;
    }

    // Football
    function renderFB(matches){
      allM=matches;
      const live=matches.filter(m=>m.isLive),up=matches.filter(m=>!m.isLive);
      let h='';
      if(live.length){
        h+=`<div class="lb"><div class="lb-h"><div class="live-b">● LIVE</div><div class="lb-t">${live.length} pertandingan</div></div><div class="lb-m">${live.map(m=>mc(m,1)).join('')}</div></div>`;
      }
      if(up.length){
        h+=`<div class="sec"><div class="sh"><div class="st">📅 Akan Datang</div><div class="sc">${up.length}</div></div><div class="lb-m" style="flex-wrap:wrap;gap:8px">${up.map(m=>mc(m,0)).join('')}</div></div>`;
      }
      el('ct2').innerHTML=h;
    }

    function mc(m,lv){
      const t=m.name.split(/\s+vs\s+/i),t1=t[0]?.trim()||m.name,t2=t[1]?.trim()||'';
      const d=m.url.replace(/'/g,'&#39;').replace(/"/g,'&quot;'),dn=m.name.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      return`<div class="mc" data-url="${d}" data-name="${dn}" onclick="mcClick(this)"><div class="mc-t"><div class="mc-l">⚽ Football</div><div class="mc-s ${lv?'live':'up'}">${lv?'● LIVE':'Upcoming'}</div></div><div class="mc-tm"><div class="mc-r"><div class="mc-f">${flag(t1)}</div><div class="mc-n">${esc(t1)}</div></div><div class="mc-vs">VS</div>${t2?`<div class="mc-r"><div class="mc-f">${flag(t2)}</div><div class="mc-n">${esc(t2)}</div></div>`:''}</div><div class="mc-b"><div class="mc-st">🔍 Cari stream...</div><div class="mc-p"></div></div></div>`;
    }

    function mcClick(e){const u=e.dataset.url,n=e.dataset.name;if(u&&n)findStreams(u,n)}

    function flag(n){
      const f={canada:'🇨🇦',bosnia:'🇧🇦',usa:'🇺🇸',paraguay:'🇵🇾',brazil:'🇧🇷',argentina:'🇦🇷',germany:'🇩🇪',france:'🇫🇷',spain:'🇪🇸',italy:'🇮🇹',england:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',portugal:'🇵🇹',netherlands:'🇳🇱',belgium:'🇧🇪',croatia:'🇭🇷',japan:'🇯🇵',korea:'🇰🇷',mexico:'🇲🇽',colombia:'🇨🇴',uruguay:'🇺🇾',india:'🇮🇳',china:'🇨🇳',australia:'🇦🇺',saudi:'🇸🇦',indonesia:'🇮🇩',qatar:'🇶🇦',morocco:'🇲🇦',switzerland:'🇨🇭',turkey:'🇹🇷',iran:'🇮🇷',serbia:'🇷🇸',poland:'🇵🇱',ukraine:'🇺🇦',sweden:'🇸🇪',denmark:'🇩🇰',norway:'🇳🇴',finland:'🇫🇮',greece:'🇬🇷',egypt:'🇪🇬',cameroon:'🇨🇲',senegal:'🇸🇳',ghana:'🇬🇭',nigeria:'🇳🇬',peru:'🇵🇪',chile:'🇨🇱',ecuador:'🇪🇨',venezuela:'🇻🇪',bolivia:'🇧🇴',paraguay:'🇵🇾'};
      const l=n.toLowerCase();for(const[k,v]of Object.entries(f)){if(l.includes(k))return v}return'⚽';
    }

    async function findStreams(url,name){
      const c=el('ct2');
      c.innerHTML=`<div class="bk" onclick="load(cur)"><span class="bk-a">←</span>Kembali</div><div class="sec"><div class="sh"><div class="st">⚽ ${esc(name)}</div></div><div class="msg"><div class="spn"></div>Mencari stream aktif...</div></div>`;
      try{
        const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),120000);
        const r=await fetch(`${API}/api/working-streams?url=${encodeURIComponent(url)}`,{signal:ctrl.signal});clearTimeout(to);
        const s=await r.json();
        if(!s.length){c.innerHTML=`<div class="bk" onclick="load(cur)"><span class="bk-a">←</span>Kembali</div><div class="msg">Tidak ada stream aktif.</div>`;return}
        c.innerHTML=`<div class="bk" onclick="load(cur)"><span class="bk-a">←</span>Kembali</div><div class="sec"><div class="sh"><div class="st">⚽ ${esc(name)}</div><div class="sc">${s.length} stream</div></div><div class="sl">${s.map(x=>`<div class="si" onclick="playDirect('${esc(x.m3u8)}')"><div class="si-i">${pi(x.name)}</div><div style="flex:1;min-width:0"><div class="si-n">${esc(x.name)}</div><div class="si-m">${esc(x.channel||'HD')}</div></div><div class="si-q">HD</div><div class="si-a">›</div></div>`).join('')}</div></div>`;
      }catch{c.innerHTML=`<div class="bk" onclick="load(cur)"><span class="bk-a">←</span>Kembali</div><div class="msg">Gagal mencari stream.</div>`}
    }

    function pi(n){const l=n.toLowerCase();if(l.includes('bein')||l.includes('crack'))return'🔴';if(l.includes('soccer')||l.includes('football'))return'⚽';if(l.includes('sport')||l.includes('stream'))return'📡';return'🎬'}

    // Play
    async function playUrl(url){
      showP();setL('CONNECTING');showL(true);
      try{const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),30000);const r=await fetch(`${API}/api/m3u8?url=${encodeURIComponent(url)}`,{signal:ctrl.signal});clearTimeout(to);const d=await r.json();if(d.url)playHls(d.url);else{showL(false);closeP();playI(url)}}catch{showL(false);closeP();playI(url)}
    }
    function playDirect(u){showP();setL('CONNECTING');showL(true);playHls(u)}

    function playHls(url){
      const v=el('vid');if(hls){hls.destroy();hls=null}
      if(Hls.isSupported()){
        hls=new Hls({maxBufferLength:15,maxMaxBufferLength:30,liveSyncDurationCount:3,enableWorker:true,lowLatencyMode:true,manifestLoadingTimeOut:15000,levelLoadingTimeOut:15000,fragLoadingTimeOut:20000});
        hls.loadSource(url);hls.attachMedia(v);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>{v.play().catch(()=>{});setL('LIVE');showL(false);autoUn()});
        hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){showL(false);if(d.type===Hls.ErrorTypes.NETWORK_ERROR){setL('RECONNECTING');setTimeout(()=>{try{hls.startLoad()}catch{}},3000)}else setL('ERROR',1)}});
        setTimeout(()=>showL(false),10000);
      }else if(v.canPlayType('application/vnd.apple.mpegurl')){
        v.src=url;v.addEventListener('loadedmetadata',()=>{v.play().catch(()=>{});setL('LIVE');showL(false);autoUn()});
        v.addEventListener('error',()=>{setL('ERROR',1);showL(false)});setTimeout(()=>showL(false),10000);
      }else{setL('NOT SUPPORTED',1);showL(false)}
    }
    function autoUn(){if(gesture){el('vid').muted=false;el('bm').textContent='🔊'}}
    ['click','touchstart','touchend'].forEach(e=>document.addEventListener(e,()=>{gesture=true},{passive:true}));

    // Player UI
    function showP(){closeI();const e=el('pw');e.classList.add('show');e.scrollIntoView({behavior:'smooth'});resetC()}
    function setL(t,i){const e=el('pl');e.innerHTML=t==='LIVE'?'<div class="ld"></div> LIVE':t;e.className=i?'pl err':'pl';if(t==='LIVE')setTimeout(()=>{if(cVis)e.classList.add('hid')},4000)}
    function showL(s){el('lo').classList.toggle('show',s)}
    function togPlay(){const v=el('vid');if(v.paused){v.play();el('bp').textContent='⏸';el('cp').classList.remove('show')}else{v.pause();el('bp').textContent='▶';el('cp').classList.add('show')}resetC()}
    function togMute(){const v=el('vid');v.muted=!v.muted;el('bm').textContent=v.muted?'🔇':'🔊';resetC()}

    function goFs(){
      const c=el('pw'),v=el('vid');
      if(isIOS){try{v.webkitEnterFullscreen?.()}catch{}}
      else{const e=c.requestFullscreen?c:v;try{e.requestFullscreen?.()||e.webkitRequestFullscreen?.()||e.mozRequestFullScreen?.()}catch{}try{screen.orientation?.lock?.('landscape')}catch{}}
      resetC()
    }
    document.addEventListener('fullscreenchange',onFs);document.addEventListener('webkitfullscreenchange',onFs);
    function onFs(){const f=!!(document.fullscreenElement||document.webkitFullscreenElement);el('bf').innerHTML=f?'<svg class="svg" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>':'<svg class="svg" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>';if(!f)try{screen.orientation?.unlock?.()}catch{}}

    function showC(){if(!cVis){cVis=true;el('ct').classList.remove('hid');el('pcl').style.display='';el('pl').classList.remove('hid')}resetC()}
    function hideC(){cVis=false;el('ct').classList.add('hid');el('pcl').style.display='none';el('pl').classList.add('hid');el('cp').classList.remove('show')}
    function resetC(){if(cTimer)clearTimeout(cTimer);cTimer=setTimeout(()=>{const v=el('vid');if(v&&!v.paused&&!v.ended)hideC()},3000)}
    el('tz').addEventListener('click',()=>{cVis?hideC():showC()});
    el('pw').addEventListener('mousemove',showC);
    let lt=0;el('tz').addEventListener('touchend',e=>{const n=Date.now();if(n-lt<300){e.preventDefault();goFs()}lt=n});

    function closeP(){el('pw').classList.remove('show');if(hls){hls.destroy();hls=null}const v=el('vid');v.pause();v.src='';if(cTimer)clearTimeout(cTimer);showL(false);try{document.fullscreenElement&&document.exitFullscreen()}catch{}}
    function playI(u){const w=el('iw');el('ifr').src=u;w.style.display='block';w.scrollIntoView({behavior:'smooth'})}
    function closeI(){el('iw').style.display='none';el('ifr').src='about:blank'}

    // Search
    function openSearch(){el('so').classList.add('show');el('si').focus()}
    function closeSearch(){el('so').classList.remove('show');el('si').value=''}
    function doSearch(q){
      const r=el('sr');if(!q.trim()){r.innerHTML='';return}
      const l=q.toLowerCase(),f=allM.filter(m=>m.name.toLowerCase().includes(l));
      r.innerHTML=f.length?f.map(m=>{const u=m.url.replace(/'/g,'&#39;').replace(/"/g,'&quot;'),n=m.name.replace(/'/g,'&#39;').replace(/"/g,'&quot;');return`<div class="si" data-url="${u}" data-name="${n}" onclick="closeSearch();mcClick(this)"><div class="si-i">${m.isLive?'🔴':'⚽'}</div><div style="flex:1;min-width:0"><div class="si-n">${esc(m.name)}</div><div class="si-m">${m.isLive?'LIVE':'Upcoming'}</div></div><div class="si-a">›</div></div>`}).join(''):'<div class="msg">Tidak ditemukan.</div>';
    }

    function el(id){return document.getElementById(id)}
    function esc(s){if(typeof s!=='string')s=String(s);const d=document.createElement('div');d.textContent=s;return d.innerHTML}

    init();
  </script>
</body>
</html>

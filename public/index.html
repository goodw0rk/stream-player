<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Stream</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root{--bg:#0a0a0a;--card:#161616;--card-hover:#1e1e1e;--accent:#e11d48;--accent-glow:rgba(225,29,72,0.3);--green:#16a34a;--text:#f0f0f0;--text-dim:#888;--border:#2a2a2a;--radius:14px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 16px 0;border-bottom:1px solid var(--border)}
    .topbar h1{font-size:20px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .topbar h1 .dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px;-webkit-overflow-scrolling:touch}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:8px 16px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
    .tab:not(.active):active{background:var(--card-hover)}

    /* Player */
    .player-container{display:none;position:relative;background:#000;width:100%;aspect-ratio:16/9;overflow:hidden}
    .player-container.show{display:block}
    .player-container video{width:100%;height:100%;display:block;object-fit:contain;background:#000}

    /* Fullscreen: force landscape-capable fill */
    .player-container:fullscreen,
    .player-container:-webkit-full-screen{
      width:100vw!important;height:100vh!important;aspect-ratio:auto!important;display:flex!important;align-items:center;justify-content:center;
    }
    .player-container:fullscreen video,
    .player-container:-webkit-full-screen video{
      width:100%;height:100%;object-fit:contain;
    }
    .player-container:fullscreen .player-bar,
    .player-container:-webkit-full-screen .player-bar{padding:16px 20px}
    .player-container:fullscreen .player-bar button,
    .player-container:-webkit-full-screen .player-bar button{font-size:28px;padding:10px}

    /* Stream label */
    .stream-label{position:absolute;top:10px;left:10px;background:rgba(22,163,74,0.9);color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;z-index:10;transition:opacity 0.4s ease;pointer-events:none}
    .stream-label.error{background:rgba(225,29,72,0.9)}
    .stream-label.hidden{opacity:0}

    /* Back button */
    .back-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:18px;padding:6px 12px;border-radius:8px;cursor:pointer;z-index:10;transition:opacity 0.4s ease}
    .back-btn.hidden{opacity:0;pointer-events:none}

    /* Player bar */
    .player-bar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,0.85));display:flex;align-items:center;gap:12px;z-index:10;transition:opacity 0.4s ease}
    .player-bar.hidden{opacity:0;pointer-events:none}
    .player-bar button{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:6px;border-radius:8px;-webkit-tap-highlight-color:transparent;line-height:1}
    .player-bar button:active{background:rgba(255,255,255,0.15)}
    .player-bar .spacer{flex:1}

    /* SVG icon for fullscreen */
    .fs-icon{width:22px;height:22px;fill:#fff;vertical-align:middle}
    .player-bar button .fs-icon{width:24px;height:24px}

    /* Center play button */
    .center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.8);border-radius:50%;display:none;align-items:center;justify-content:center;z-index:10;transition:opacity 0.4s ease}
    .center-play.show{display:flex}
    .center-play.hidden{opacity:0;pointer-events:none}
    .center-play::after{content:'';display:block;width:0;height:0;border-style:solid;border-width:12px 0 12px 22px;border-color:transparent transparent transparent #fff;margin-left:4px}

    /* Loading overlay */
    .loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:8}
    .loading-overlay.show{display:flex}
    .loading-overlay .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Touch overlay */
    .touch-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:6}

    /* Content */
    .content{padding:16px}
    .section-title{font-size:13px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .event-list,.stream-list{display:flex;flex-direction:column;gap:8px}
    .event-card,.stream-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
    .event-card:active,.stream-card:active{background:var(--card-hover);transform:scale(0.98)}
    .event-name{font-size:15px;font-weight:600}
    .event-meta{font-size:12px;color:var(--text-dim);margin-top:4px}
    .stream-card{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px}
    .stream-card .server-dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
    .stream-card .server-name{font-size:14px;font-weight:500}
    .stream-card .server-channel{font-size:12px;color:var(--text-dim)}
    .stream-card .server-arrow{margin-left:auto;color:var(--text-dim);font-size:16px}
    .nav-back{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;padding:6px 0;-webkit-tap-highlight-color:transparent}
    .nav-back:active{color:var(--text)}
    .loading{text-align:center;padding:40px 0;color:var(--text-dim)}
    .loading .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    .empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
    .live-badge{display:inline-block;background:var(--accent);color:#fff;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:8px;vertical-align:middle}
    .server-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
    .server-card:active{background:var(--card-hover);transform:scale(0.98)}
    .server-card .label{font-size:15px;font-weight:600}
    .server-card .sub{font-size:12px;color:var(--text-dim);margin-top:4px}

    /* Iframe fallback player */
    .iframe-player{display:none;width:100%;aspect-ratio:16/9;border:none;background:#000}
    .iframe-player.show{display:block}
  </style>
</head>
<body>
  <div class="topbar">
    <h1><span class="dot"></span> Live Stream</h1>
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- HLS Player -->
  <div class="player-container" id="playerHls">
    <div class="stream-label" id="streamLabel">CONNECTING</div>
    <video id="video" playsinline webkit-playsinline autoplay muted></video>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="touch-overlay" id="touchOverlay"></div>
    <div class="center-play" id="centerPlay" onclick="togglePlay()"></div>
    <div class="player-bar" id="playerBar">
      <button id="btnPlayPause" onclick="togglePlay()">⏸</button>
      <button id="btnMute" onclick="toggleMute()">🔇</button>
      <div class="spacer"></div>
      <button id="btnFullscreen" onclick="goFullscreen()">
        <svg class="fs-icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
    <button class="back-btn" id="backBtn" onclick="closePlayer()">✕</button>
  </div>

  <!-- Iframe fallback player (for streams that can't extract m3u8) -->
  <div id="iframePlayerWrap" style="display:none;position:relative">
    <iframe id="iframePlayer" class="iframe-player show" allowfullscreen allow="autoplay; fullscreen; picture-in-picture; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"></iframe>
    <button style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:18px;padding:6px 12px;border-radius:8px;cursor:pointer;z-index:10" onclick="closeIframePlayer()">✕</button>
    <button id="btnIframeFs" style="position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.6);border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;z-index:10" onclick="goIframeFullscreen()">
      <svg class="fs-icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>

  <script>
    const API='';
    let currentSport='football',hls=null,sports=[],sportSource={};
    let controlsTimer=null,controlsVisible=true;
    let isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
    let isAndroid=/Android/i.test(navigator.userAgent);

    // ─── Init ──────────────────────────────────────────────────────
    async function init(){
      try{
        const res=await fetch(`${API}/api/sports`);
        sports=await res.json();
        sports.forEach(s=>sportSource[s.key]=s.source);
        renderTabs();
        loadListings(currentSport);
      }catch(e){
        document.getElementById('content').innerHTML='<div class="empty">Server offline. Refresh halaman.</div>';
      }
    }

    function renderTabs(){
      document.getElementById('tabs').innerHTML=sports.map(s=>
        `<div class="tab ${s.key===currentSport?'active':''}" onclick="switchSport('${s.key}')">${s.label}</div>`
      ).join('');
    }

    function switchSport(key){
      currentSport=key;renderTabs();closePlayer();closeIframePlayer();loadListings(key);
    }

    // ─── Listings ──────────────────────────────────────────────────
    async function loadListings(sport){
      const c=document.getElementById('content');
      c.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
      try{
        const res=await fetch(`${API}/api/listings/${sport}`);
        const data=await res.json();
        if(!data.length){c.innerHTML='<div class="empty">Tidak ada stream tersedia.</div>';return;}
        if(sportSource[sport]==='nontonx') renderNontonXServers(data,sport);
        else if(sportSource[sport]==='footybitez') renderFootybitezMatches(data);
      }catch{c.innerHTML='<div class="empty">Gagal load. Coba lagi.</div>';}
    }

    // ─── NontonX ────────────────────────────────────────────────────
    function renderNontonXServers(servers,sport){
      const label=sports.find(s=>s.key===sport)?.label||sport;
      document.getElementById('content').innerHTML=`
        <div class="section-title">${label} — ${servers.length} server</div>
        <div class="event-list">
          ${servers.map(s=>`
            <div class="server-card" onclick="playM3u8FromUrl('${escAttr(s.url)}')">
              <div class="label">${escHtml(s.name)}</div>
              <div class="sub">Tap untuk play</div>
            </div>`).join('')}
        </div>`;
    }

    // ─── Footybitez ─────────────────────────────────────────────────
    function renderFootybitezMatches(matches){
      document.getElementById('content').innerHTML=`
        <div class="section-title">⚽ Football — ${matches.length} match</div>
        <div class="event-list">
          ${matches.map(m=>`
            <div class="event-card" onclick='loadProviders(${JSON.stringify(m.url)},${JSON.stringify(m.name)})'>
              <div class="event-name">${escHtml(m.name)}${m.isLive?'<span class="live-badge">LIVE</span>':''}</div>
              <div class="event-meta">${m.isLive?'Sedang berlangsung':'Akan datang'}</div>
            </div>`).join('')}
        </div>`;
    }

    async function loadProviders(matchUrl,matchName){
      const c=document.getElementById('content');
      c.innerHTML=`
        <div class="nav-back" onclick="loadListings(currentSport)">← Kembali</div>
        <div class="section-title">${escHtml(matchName)}</div>
        <div class="loading"><div class="spinner"></div>Mencari stream yang aktif...</div>`;
      try{
        // Use working-streams endpoint to find providers that actually work
        const ctrl=new AbortController();
        const timeout=setTimeout(()=>ctrl.abort(),120000); // 2min timeout for testing
        const res=await fetch(`${API}/api/working-streams?url=${encodeURIComponent(matchUrl)}`,{signal:ctrl.signal});
        clearTimeout(timeout);
        const streams=await res.json();
        if(!streams.length){
          c.innerHTML=`<div class="nav-back" onclick="loadListings(currentSport)">← Kembali</div>
            <div class="section-title">${escHtml(matchName)}</div><div class="empty">Tidak ada stream aktif ditemukan.</div>`;
          return;
        }
        c.innerHTML=`
          <div class="nav-back" onclick="loadListings(currentSport)">← Kembali</div>
          <div class="section-title">${escHtml(matchName)} — ${streams.length} stream aktif</div>
          <div class="stream-list">
            ${streams.map((s,i)=>`
              <div class="stream-card" onclick="playM3u8Direct('${escAttr(s.m3u8)}')">
                <div class="server-dot"></div>
                <div class="server-name">${escHtml(s.name)}</div>
                <div class="server-channel">${escHtml(s.channel||'')}</div>
                <div class="server-arrow">›</div>
              </div>`).join('')}
          </div>`;
      }catch{
        c.innerHTML=`<div class="nav-back" onclick="loadListings(currentSport)">← Kembali</div>
          <div class="empty">Gagal mencari stream.</div>`;
      }
    }

    // Play m3u8 directly (no API call needed, already resolved)
    function playM3u8Direct(m3u8Url){
      showPlayer();
      setLabel('CONNECTING...');
      showLoading(true);
      playM3u8(m3u8Url);
    }

    // ─── Play stream (tries m3u8 first, falls back to iframe) ─────
    async function playStream(providerUrl, name){
      showPlayer();
      setLabel('CONNECTING...');
      showLoading(true);
      try{
        const ctrl=new AbortController();
        const timeout=setTimeout(()=>ctrl.abort(),30000);
        const res=await fetch(`${API}/api/m3u8?url=${encodeURIComponent(providerUrl)}`,{signal:ctrl.signal});
        clearTimeout(timeout);
        const data=await res.json();
        if(data.url){
          playM3u8(data.url);
        }else{
          // Fallback: try iframe embed
          showLoading(false);
          closePlayer();
          playIframeFallback(providerUrl);
        }
      }catch{
        // On error, try iframe fallback
        showLoading(false);
        closePlayer();
        playIframeFallback(providerUrl);
      }
    }

    // ─── Iframe fallback ───────────────────────────────────────────
    function playIframeFallback(url){
      const wrap=document.getElementById('iframePlayerWrap');
      const iframe=document.getElementById('iframePlayer');
      wrap.style.display='block';
      iframe.src=url;
      wrap.scrollIntoView({behavior:'smooth'});
    }

    function closeIframePlayer(){
      const wrap=document.getElementById('iframePlayerWrap');
      const iframe=document.getElementById('iframePlayer');
      wrap.style.display='none';
      iframe.src='about:blank';
    }

    function goIframeFullscreen(){
      const iframe=document.getElementById('iframePlayer');
      try{
        if(iframe.requestFullscreen) iframe.requestFullscreen();
        else if(iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
        else if(iframe.mozRequestFullScreen) iframe.mozRequestFullScreen();
        else if(iframe.msRequestFullscreen) iframe.msRequestFullscreen();
      }catch(e){console.warn('iframe fullscreen failed',e)}
      // Try to request fullscreen on parent wrapper too
      if(isIOS){
        // iOS: try native video inside iframe (limited)
        try{iframe.webkitRequestFullscreen();}catch{}
      }
    }

    // ─── Player show/hide ──────────────────────────────────────────
    function showPlayer(){
      closeIframePlayer();
      const el=document.getElementById('playerHls');
      el.classList.add('show');
      el.scrollIntoView({behavior:'smooth'});
      resetControlsTimer();
    }

    function setLabel(text,isError){
      const el=document.getElementById('streamLabel');
      el.textContent=text;
      el.className=isError?'stream-label error':'stream-label';
      if(text==='● LIVE'){
        setTimeout(()=>{if(controlsVisible) el.classList.add('hidden');},4000);
      }
    }

    function showLoading(show){
      document.getElementById('loadingOverlay').classList.toggle('show',show);
    }

    // ─── Play m3u8 from API (called by NontonX) ──────────────────
    async function playM3u8FromUrl(url){
      showPlayer();
      setLabel('CONNECTING...');
      showLoading(true);
      try{
        const ctrl=new AbortController();
        const timeout=setTimeout(()=>ctrl.abort(),30000);
        const res=await fetch(`${API}/api/m3u8?url=${encodeURIComponent(url)}`,{signal:ctrl.signal});
        clearTimeout(timeout);
        const data=await res.json();
        if(data.url) playM3u8(data.url);
        else{setLabel('NO STREAM',true);showLoading(false);}
      }catch{setLabel('ERROR',true);showLoading(false);}
    }

    // ─── HLS Player ────────────────────────────────────────────────
    function playM3u8(url){
      const video=document.getElementById('video');
      if(hls){hls.destroy();hls=null;}

      if(Hls.isSupported()){
        hls=new Hls({
          maxBufferLength:15,
          maxMaxBufferLength:30,
          liveSyncDurationCount:3,
          enableWorker:true,
          lowLatencyMode:true,
          manifestLoadingTimeOut:15000,
          levelLoadingTimeOut:15000,
          fragLoadingTimeOut:20000,
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>{
          video.play().catch(()=>{});
          setLabel('● LIVE');
          showLoading(false);
          // Auto-unmute after user gesture detection
          autoUnmute();
        });
        hls.on(Hls.Events.ERROR,(_,data)=>{
          if(data.fatal){
            showLoading(false);
            if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
              setLabel('RECONNECTING...');
              setTimeout(()=>{try{hls.startLoad();}catch{}},3000);
            }else{
              setLabel('STREAM ERROR',true);
            }
          }
        });
        setTimeout(()=>{showLoading(false);},10000);
      }else if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src=url;
        video.addEventListener('loadedmetadata',()=>{
          video.play().catch(()=>{});
          setLabel('● LIVE');
          showLoading(false);
          autoUnmute();
        });
        video.addEventListener('error',()=>{setLabel('STREAM ERROR',true);showLoading(false);});
        setTimeout(()=>{showLoading(false);},10000);
      }else{
        setLabel('NOT SUPPORTED',true);
        showLoading(false);
      }
    }

    // Auto-unmute: detect first user interaction, then unmute
    let hasUserGesture=false;
    function autoUnmute(){
      if(hasUserGesture){
        const v=document.getElementById('video');
        v.muted=false;
        document.getElementById('btnMute').textContent='🔊';
      }
    }
    ['click','touchstart','touchend'].forEach(evt=>{
      document.addEventListener(evt,()=>{hasUserGesture=true;},{once:false,passive:true});
    });

    // ─── Controls ──────────────────────────────────────────────────
    function togglePlay(){
      const v=document.getElementById('video');
      const b=document.getElementById('btnPlayPause');
      const cp=document.getElementById('centerPlay');
      if(v.paused){v.play();b.textContent='⏸';cp.classList.remove('show');}
      else{v.pause();b.textContent='▶';cp.classList.add('show');}
      resetControlsTimer();
    }

    function toggleMute(){
      const v=document.getElementById('video');
      v.muted=!v.muted;
      document.getElementById('btnMute').textContent=v.muted?'🔇':'🔊';
      resetControlsTimer();
    }

    // ─── Fullscreen (robust mobile + desktop) ─────────────────────
    function goFullscreen(){
      const container=document.getElementById('playerHls');
      const video=document.getElementById('video');

      if(isIOS){
        // iOS Safari: only <video> supports native fullscreen
        try{
          if(video.webkitEnterFullscreen) video.webkitEnterFullscreen();
          else if(video.webkitSupportsFullscreen) video.webkitEnterFullscreen();
        }catch(e){
          console.warn('iOS fullscreen failed',e);
          // Fallback: try webkit on container
          try{container.webkitEnterFullscreen();}catch{}
        }
      }else if(isAndroid){
        // Android: requestFullscreen on video element is most reliable
        try{
          if(video.requestFullscreen) video.requestFullscreen();
          else if(video.webkitRequestFullscreen) video.webkitRequestFullscreen();
          else if(video.mozRequestFullScreen) video.mozRequestFullScreen();
          else if(container.requestFullscreen) container.requestFullscreen();
          else if(container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }catch(e){
          console.warn('Android fullscreen failed',e);
        }
        // Try to lock to landscape on mobile
        try{
          if(screen.orientation && screen.orientation.lock){
            screen.orientation.lock('landscape').catch(()=>{});
          }
        }catch{}
      }else{
        // Desktop
        const el = container.requestFullscreen ? container :
                    container.webkitRequestFullscreen ? container :
                    video;
        try{
          if(el.requestFullscreen) el.requestFullscreen();
          else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
          else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
          else if(el.msRequestFullscreen) el.msRequestFullscreen();
        }catch(e){console.warn('Desktop fullscreen failed',e)}
      }
      resetControlsTimer();
    }

    // Fullscreen change handler — update icon
    document.addEventListener('fullscreenchange',onFullscreenChange);
    document.addEventListener('webkitfullscreenchange',onFullscreenChange);
    function onFullscreenChange(){
      const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
      const btn=document.getElementById('btnFullscreen');
      if(isFS){
        // Show exit-fullscreen icon
        btn.innerHTML='<svg class="fs-icon" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>';
      }else{
        // Show enter-fullscreen icon
        btn.innerHTML='<svg class="fs-icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>';
      }
      // Unlock orientation when exiting fullscreen
      if(!isFS){
        try{if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();}catch{}
      }
    }

    // ─── Controls visibility (auto-hide) ───────────────────────────
    function showControls(){
      if(!controlsVisible){
        controlsVisible=true;
        document.getElementById('playerBar').classList.remove('hidden');
        document.getElementById('backBtn').classList.remove('hidden');
        document.getElementById('streamLabel').classList.remove('hidden');
      }
      resetControlsTimer();
    }

    function hideControls(){
      controlsVisible=false;
      document.getElementById('playerBar').classList.add('hidden');
      document.getElementById('backBtn').classList.add('hidden');
      document.getElementById('streamLabel').classList.add('hidden');
      document.getElementById('centerPlay').classList.remove('show');
    }

    function resetControlsTimer(){
      if(controlsTimer) clearTimeout(controlsTimer);
      controlsTimer=setTimeout(()=>{
        const v=document.getElementById('video');
        if(v&&!v.paused&&!v.ended) hideControls();
      },3000);
    }

    // Tap to toggle controls
    document.getElementById('touchOverlay').addEventListener('click',()=>{
      if(controlsVisible) hideControls();
      else showControls();
    });

    document.getElementById('playerHls').addEventListener('mousemove',showControls);

    // Double-tap for fullscreen
    let lastTap=0;
    document.getElementById('touchOverlay').addEventListener('touchend',e=>{
      const now=Date.now();
      if(now-lastTap<300){e.preventDefault();goFullscreen();}
      lastTap=now;
    });

    // ─── Close player ──────────────────────────────────────────────
    function closePlayer(){
      document.getElementById('playerHls').classList.remove('show');
      if(hls){hls.destroy();hls=null;}
      const v=document.getElementById('video');v.pause();v.src='';
      if(controlsTimer) clearTimeout(controlsTimer);
      showLoading(false);
      // Exit fullscreen if active
      try{
        if(document.fullscreenElement) document.exitFullscreen();
        else if(document.webkitFullscreenElement) document.webkitExitFullscreen();
      }catch{}
    }

    // ─── Utils ─────────────────────────────────────────────────────
    function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function escAttr(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}

    init();
  </script>
</body>
</html>
